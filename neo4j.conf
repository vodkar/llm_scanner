# Neo4j configuration overrides for local benchmarking
# Increase transaction memory cap to avoid bulk load failures
dbms.memory.transaction.total.max=6G
server.memory.heap.initial_size=3G
server.memory.heap.max_size=6G
server.memory.pagecache.size=3G

# Prune the WAL aggressively — benchmarking does not need point-in-time recovery,
# and DETACH-DELETE-then-MERGE per sample generates tens of GB of log otherwise.
db.tx_log.rotation.retention_policy=keep_none
db.checkpoint.interval.tx=10000
db.checkpoint.interval.time=2m
